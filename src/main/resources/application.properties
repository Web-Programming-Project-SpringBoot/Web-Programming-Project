spring.application.name=ToDoApp

# Veritabani baglanti ayarlari 
spring.datasource.url=jdbc:postgresql://localhost:5432/todoApp
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate ayarlari
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.javax.persistence.validation.mode=none
spring.jpa.properties.jakarta.persistence.validation.mode=none
spring.jpa.open-in-view=false

# Flyway ayarlari
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description="Initial schema"
#spring.flyway.clean-on-validation-error=true
spring.flyway.clean-disabled=false 

# Jwt ayarlari
jwt.secret=XbW3BlsTv92B2xKXJfYjxfp9pfZPTzH60haB1Ihssimk3h2r9S58tSR3OVv4KV9U2vFl2u+vZgOvx+Fzc+jhOg==
jwt.expiration=86400000 

# Server ayarlari
server.port=8082

# Logging ayarlari
logging.level.com.taskmanagement=DEBUG
logging.level.org.springframework.security=DEBUG

# Aspect (AOP) ayarlari
spring.aop.proxy-target-class=true
