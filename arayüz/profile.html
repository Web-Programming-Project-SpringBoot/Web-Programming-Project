<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      padding-top: 70px;
    }
    .profile-card {
      max-width: 500px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">TaskManager</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
        <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
        <li class="nav-item"><a class="nav-link" href="tasks.html">Tasks</a></li>
        <li class="nav-item"><a class="nav-link" href="userroles.html">User Roles</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link text-danger" href="login.html">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Profile Info -->
<div class="container mt-5">
  <div class="card profile-card shadow">
    <div class="card-body text-center">
      <h3 class="card-title mb-3">User Profile</h3>
      <p><strong>Username:</strong> <span id="username"></span></p>
      <p><strong>Email:</strong> <span id="email"></span></p>
      <p><strong>Full Name:</strong> <span id="fullName"></span></p>
      <p><strong>Roles:</strong> <span id="roles"></span></p>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const token = localStorage.getItem("token");
    const userId = localStorage.getItem("userId");

    if (!token || !userId) {
      window.location.href = "login.html";
      return;
    }

    try {
      const res = await fetch(`/api/users/${userId}`, {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      if (!res.ok) throw new Error("Kullanıcı bilgileri alınamadı");

      const user = await res.json();
      document.getElementById("username").textContent = user.username;
      document.getElementById("email").textContent = user.email || "N/A";
      document.getElementById("fullName").textContent = `${user.firstName || ""} ${user.lastName || ""}`;
      document.getElementById("roles").textContent = (user.roles || []).map(r => r.name).join(", ");

    } catch (err) {
      alert("Profil bilgileri alınamadı.");
      console.error(err);
    }
  });
</script>

</body>
</html>
