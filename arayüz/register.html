<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .register-card {
      width: 100%;
      max-width: 400px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      background: white;
    }
    .form-control, .btn {
      border-radius: 10px;
    }
    .small-link {
      font-size: 0.9rem;
      display: block;
      margin-top: 15px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="register-card">
    <h3 class="text-center mb-4">Yeni Hesap Oluştur</h3>

    <div class="mb-3">
      <label for="fullName" class="form-label">Ad Soyad</label>
      <input type="text" id="fullName" class="form-control" placeholder="Adınızı girin"/>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com"/>
    </div>
    <div class="mb-4">
      <label for="password" class="form-label">Şifre</label>
      <input type="password" id="password" class="form-control" placeholder="Şifrenizi girin"/>
    </div>
    <div class="d-grid">
      <button class="btn btn-success" onclick="register()">Kayıt Ol</button>
    </div>
    
    <div class="small-link">
      Zaten bir hesabınız var mı? <a href="login.html">Giriş yapın</a>
    </div>

    <div class="mt-3 text-center text-danger" id="errorMessage"></div>
    <div class="mt-2 text-center text-success" id="successMessage"></div>
  </div>

  <script>
    function register() {
      const fullName = document.getElementById("fullName").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fullName, email, password })
      })
      .then(res => {
        if (!res.ok) {
          throw new Error("Kayıt başarısız. Bilgileri kontrol edin.");
        }
        return res.json();
      })
      .then(() => {
        document.getElementById("successMessage").innerText = "Kayıt başarılı! Giriş sayfasına yönlendiriliyorsunuz...";
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      })
      .catch(err => {
        document.getElementById("errorMessage").innerText = err.message;
      });
    }
  </script>

</body>
</html>
