<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    .navbar-brand { font-weight: bold; }
    .container { margin-top: 40px; }
    .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .form-control, .btn { border-radius: 10px; }
    .btn-space { margin-right: 5px; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="#">TaskManager</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
        <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
        <li class="nav-item"><a class="nav-link" href="userroles.html">User Roles</a></li>
        <li class="nav-item"><a class="nav-link active" href="tasks.html">Tasks</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="container">
    <h2 class="mb-4">Tasks</h2>

    <!-- Add Task -->
    <div class="card p-3 mb-4">
      <h5>Add New Task</h5>
      <div class="row g-2">
        <div class="col-md-5">
          <input id="taskName" class="form-control" placeholder="Task Name" />
        </div>
        <div class="col-md-5">
          <input id="taskDescription" class="form-control" placeholder="Description" />
        </div>
        <div class="col-md-2 d-grid">
          <button class="btn btn-success" onclick="addTask()">Add Task</button>
        </div>
      </div>
    </div>

    <!-- Task List -->
    <div class="card p-3">
      <h5>Task List</h5>
      <ul id="taskList" class="list-group mt-3"></ul>
    </div>
  </div>

  <!-- JS Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem("jwt");

    if (!token) {
      window.location.href = "login.html";
    }

    function fetchTasks() {
      fetch("/api/tasks", {
        headers: { "Authorization": "Bearer " + token }
      })
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("taskList");
        list.innerHTML = "";
        data.forEach(task => {
          const li = document.createElement("li");
          li.className = "list-group-item d-flex justify-content-between align-items-center";
          li.innerHTML = `
            <div>
              <strong>${task.name}</strong> — ${task.description}
            </div>
            <div>
              <button class="btn btn-primary btn-sm btn-space" onclick='editTask(${task.id})'>Edit</button>
              <button class="btn btn-danger btn-sm" onclick='deleteTask(${task.id})'>Delete</button>
            </div>`;
          list.appendChild(li);
        });
      });
    }

    function addTask() {
      const name = document.getElementById("taskName").value;
      const desc = document.getElementById("taskDescription").value;

      fetch("/api/tasks", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ name, description: desc })
      })
      .then(() => {
        document.getElementById("taskName").value = "";
        document.getElementById("taskDescription").value = "";
        fetchTasks();
      });
    }

    function deleteTask(id) {
      fetch(`/api/tasks/${id}`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
      })
      .then(() => fetchTasks());
    }

    function editTask(id) {
      const name = prompt("New Task Name:");
      const description = prompt("New Description:");

      if (name && description) {
        fetch(`/api/tasks/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ name, description })
        })
        .then(() => fetchTasks());
      }
    }

    function logout() {
      localStorage.removeItem("jwt");
    }

    window.onload = fetchTasks;
  </script>
</body>
</html>
